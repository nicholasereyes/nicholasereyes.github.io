<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Press</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c0f;
      --bg-panel: #12161c;
      --metal: #2a3140;
      --metal-light: #3d4658;
      --rim: #1a1f28;
      --accent: #ff3d2e;
      --accent-dark: #c42a1f;
      --accent-glow: rgba(255, 61, 46, 0.45);
      --text-dim: #6b7280;
      --bezel: #0d1015;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: #e8eaed;
      font-family: "Share Tech Mono", monospace;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(255, 61, 46, 0.06) 0%, transparent 55%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.12) 2px,
          rgba(0, 0, 0, 0.12) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 2.5rem;
    }

    .counter-panel {
      text-align: center;
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bezel) 100%);
      border: 1px solid var(--metal);
      border-radius: 4px;
      padding: 1.25rem 2.5rem 1rem;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(0, 0, 0, 0.5);
      min-width: min(90vw, 22rem);
    }

    .counter-panel.loading .count-value { opacity: 0.35; }
    .counter-panel.error .count-value { color: var(--accent); }

    .count-value {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3.5rem, 14vw, 5.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: #f4f4f5;
      text-shadow:
        0 0 40px var(--accent-glow),
        0 2px 0 rgba(0, 0, 0, 0.8);
      transition: color 0.2s ease;
    }

    .count-value.tick {
      animation: countPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes countPop {
      0% { transform: translateY(0) scale(1); filter: brightness(1); }
      35% { transform: translateY(-6px) scale(1.12); filter: brightness(1.25); }
      100% { transform: translateY(0) scale(1); filter: brightness(1); }
    }

    .count-label {
      margin-top: 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .status-line {
      margin-top: 0.75rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--metal-light);
      min-height: 1em;
    }

    .status-line.err { color: var(--accent); }

    .button-stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .button-well {
      position: relative;
      width: min(72vw, 280px);
      height: min(72vw, 280px);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 35%, #1e2430 0%, var(--bezel) 70%);
      box-shadow:
        inset 0 12px 24px rgba(0, 0, 0, 0.85),
        inset 0 -2px 6px rgba(255, 255, 255, 0.04),
        0 4px 0 var(--rim);
    }

    .arcade-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 72%;
      height: 72%;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;

      background: radial-gradient(circle at 35% 30%, #ff6b5c 0%, var(--accent) 45%, var(--accent-dark) 100%);
      box-shadow:
        0 10px 0 #6b1810,
        0 14px 0 rgba(0, 0, 0, 0.45),
        0 18px 32px rgba(0, 0, 0, 0.5),
        inset 0 4px 12px rgba(255, 255, 255, 0.35),
        inset 0 -8px 16px rgba(0, 0, 0, 0.25);

      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
    }

    .arcade-btn:hover:not(:disabled) {
      filter: brightness(1.05);
    }

    .arcade-btn:active:not(:disabled) {
      transform: translate(-50%, -50%) translateY(10px);
      box-shadow:
        0 2px 0 #6b1810,
        0 4px 0 rgba(0, 0, 0, 0.4),
        0 6px 16px rgba(0, 0, 0, 0.45),
        inset 0 2px 8px rgba(255, 255, 255, 0.25),
        inset 0 -4px 10px rgba(0, 0, 0, 0.35);
    }

    .arcade-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      filter: grayscale(0.3);
    }

    .arcade-btn.spring {
      animation: btnSpring 0.55s cubic-bezier(0.34, 1.45, 0.64, 1);
    }

    @keyframes btnSpring {
      0% { transform: translate(-50%, -50%) translateY(10px) scale(0.96); }
      40% { transform: translate(-50%, -50%) translateY(-4px) scale(1.04); }
      70% { transform: translate(-50%, -50%) translateY(2px) scale(0.99); }
      100% { transform: translate(-50%, -50%) translateY(0) scale(1); }
    }

    .arcade-btn-inner {
      pointer-events: none;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(1.4rem, 5vw, 1.85rem);
      letter-spacing: 0.15em;
      color: rgba(40, 10, 8, 0.85);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    #fx {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes rip {
      to { transform: scale(14); opacity: 0; }
    }

    .footer-hint {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      opacity: 0.5;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="counterPanel" class="counter-panel loading">
      <div id="countValue" class="count-value" aria-live="polite">—</div>
      <div class="count-label">Total presses</div>
      <div id="statusLine" class="status-line">Connecting…</div>
    </div>

    <div class="button-stage">
      <canvas id="fx" width="400" height="400" aria-hidden="true"></canvas>
      <div class="button-well">
        <button type="button" id="pressBtn" class="arcade-btn" disabled aria-label="Press to increment global counter">
          <span class="arcade-btn-inner">PRESS</span>
        </button>
      </div>
    </div>
  </div>
  <p class="footer-hint">GLOBAL COUNTER</p>

  <script>
    /* ═══════════════════════════════════════════════════════════════════
       PLACEHOLDER — paste your deployed Web App URL (ends in /exec)
       Deploy: New deployment → Web app → Execute as: Me → Who has access: Anyone
       ═══════════════════════════════════════════════════════════════════ */
    const APPS_SCRIPT_URL = "PASTE_YOUR_WEB_APP_URL_HERE";

    const countEl = document.getElementById("countValue");
    const statusEl = document.getElementById("statusLine");
    const panelEl = document.getElementById("counterPanel");
    const btn = document.getElementById("pressBtn");
    const fxCanvas = document.getElementById("fx");
    const fxCtx = fxCanvas.getContext("2d");

    let currentCount = null;
    let clickInFlight = false;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.classList.toggle("err", isError);
    }

    function playClickSound() {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        const ctx = new Ctx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.setValueAtTime(420, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.06);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.09);
        osc.onended = () => ctx.close();
      } catch (_) { /* optional */ }
    }

    function burstParticles() {
      const dpr = window.devicePixelRatio || 1;
      const w = fxCanvas.clientWidth * dpr;
      const h = fxCanvas.clientHeight * dpr;
      if (fxCanvas.width !== w || fxCanvas.height !== h) {
        fxCanvas.width = w;
        fxCanvas.height = h;
      }
      const scale = Math.min(dpr, 2);
      const px = w / 2;
      const py = h / 2;

      const parts = [];
      const n = 28;
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 * i) / n + Math.random() * 0.5;
        const sp = (3 + Math.random() * 6) * scale;
        parts.push({
          x: px,
          y: py,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          life: 1,
          r: (2 + Math.random() * 3) * scale,
          hue: Math.random() > 0.4 ? 8 : 38,
        });
      }

      let start = null;
      function frame(t) {
        if (!start) start = t;
        const elapsed = t - start;
        fxCtx.clearRect(0, 0, w, h);
        let alive = false;
        for (const p of parts) {
          if (p.life <= 0) continue;
          alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15 * scale;
          p.life -= 0.045;
          fxCtx.beginPath();
          fxCtx.fillStyle = `hsla(${p.hue}, 100%, 62%, ${Math.max(0, p.life)})`;
          fxCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
          fxCtx.fill();
        }
        if (alive && elapsed < 600) requestAnimationFrame(frame);
        else fxCtx.clearRect(0, 0, w, h);
      }
      requestAnimationFrame(frame);
    }

    function rippleAtButtonCenter() {
      const rect = btn.getBoundingClientRect();
      const well = document.querySelector(".button-well");
      const wr = well.getBoundingClientRect();
      const cx = rect.left + rect.width / 2 - wr.left;
      const cy = rect.top + rect.height / 2 - wr.top;

      const ripple = document.createElement("div");
      ripple.style.cssText = `
        position:absolute;left:${cx}px;top:${cy}px;width:20px;height:20px;
        margin:-10px 0 0 -10px;border-radius:50%;
        border:3px solid rgba(255,80,60,0.85);pointer-events:none;z-index:4;
        animation: rip 0.55s ease-out forwards;
      `;
      well.style.position = "relative";
      well.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }

    function triggerSpring() {
      btn.classList.remove("spring");
      void btn.offsetWidth;
      btn.classList.add("spring");
      setTimeout(() => btn.classList.remove("spring"), 600);
    }

    function animateCount() {
      countEl.classList.remove("tick");
      void countEl.offsetWidth;
      countEl.classList.add("tick");
    }

    function displayCount(n) {
      countEl.textContent = typeof n === "number" ? n.toLocaleString() : "—";
    }

    async function apiGetCount() {
      const u = new URL(APPS_SCRIPT_URL);
      u.searchParams.set("_ts", String(Date.now()));
      const res = await fetch(u.toString(), { method: "GET", cache: "no-store" });
      if (!res.ok) throw new Error("GET failed: " + res.status);
      const data = await res.json();
      if (typeof data.count !== "number") throw new Error("Bad response shape");
      return data.count;
    }

    async function apiPostIncrement() {
      const body = new URLSearchParams({ op: "increment" });
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString(),
        cache: "no-store",
      });
      if (!res.ok) throw new Error("POST failed: " + res.status);
      const data = await res.json();
      if (typeof data.count !== "number") throw new Error("Bad response shape");
      return data.count;
    }

    async function loadCount() {
      panelEl.classList.add("loading");
      panelEl.classList.remove("error");
      btn.disabled = true;
      setStatus("Loading count…");
      try {
        if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_YOUR")) {
          throw new Error("Set APPS_SCRIPT_URL in the script");
        }
        const n = await apiGetCount();
        currentCount = n;
        displayCount(n);
        panelEl.classList.remove("loading");
        setStatus("Live · shared worldwide");
        btn.disabled = false;
      } catch (e) {
        panelEl.classList.remove("loading");
        panelEl.classList.add("error");
        setStatus(e.message || "Could not load", true);
        btn.disabled = true;
      }
    }

    async function onPress() {
      if (clickInFlight || btn.disabled) return;
      clickInFlight = true;
      btn.disabled = true;

      burstParticles();
      rippleAtButtonCenter();
      playClickSound();

      try {
        const n = await apiPostIncrement();
        if (n !== currentCount) animateCount();
        currentCount = n;
        displayCount(n);
        setStatus("Live · shared worldwide");
      } catch (err) {
        panelEl.classList.add("error");
        setStatus(err.message || "Increment failed", true);
        try {
          currentCount = await apiGetCount();
          displayCount(currentCount);
        } catch (_) { /* ignore */ }
      } finally {
        clickInFlight = false;
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", onPress);
    btn.addEventListener("mouseup", triggerSpring);
    btn.addEventListener("touchend", (ev) => {
      if (ev.target === btn) triggerSpring();
    });

    loadCount();
  </script>
</body>
</html>
