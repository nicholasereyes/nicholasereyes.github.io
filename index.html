<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Press</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c0f;
      --bg-panel: #12161c;
      --metal: #2a3140;
      --metal-light: #3d4658;
      --rim: #1a1f28;
      --accent: #ff3d2e;
      --accent-dark: #c42a1f;
      --accent-light: #ff6b5c;
      --accent-shadow: #6b1810;
      --accent-glow: rgba(255, 61, 46, 0.45);
      --accent-spot: rgba(255, 61, 46, 0.06);
      --text-dim: #6b7280;
      --bezel: #0d1015;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: #e8eaed;
      font-family: "Share Tech Mono", monospace;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, var(--accent-spot) 0%, transparent 55%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.12) 2px,
          rgba(0, 0, 0, 0.12) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 2.5rem;
    }

    .counter-panel {
      text-align: center;
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bezel) 100%);
      border: 1px solid var(--metal);
      border-radius: 4px;
      padding: 1.25rem 2.5rem 1rem;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(0, 0, 0, 0.5);
      min-width: min(90vw, 22rem);
    }

    .counter-panel.loading .count-value { opacity: 0.35; }
    .counter-panel.error .count-value { color: var(--accent); }

    .count-value {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3.5rem, 14vw, 5.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: #f4f4f5;
      text-shadow:
        0 0 40px var(--accent-glow),
        0 2px 0 rgba(0, 0, 0, 0.8);
      transition: color 0.2s ease;
    }

    .count-value.tick {
      animation: countPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .count-value.tick-jackpot {
      animation: countJackpot 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes countPop {
      0% { transform: translateY(0) scale(1); filter: brightness(1); }
      35% { transform: translateY(-6px) scale(1.12); filter: brightness(1.25); }
      100% { transform: translateY(0) scale(1); filter: brightness(1); }
    }

    @keyframes countJackpot {
      0% { transform: translateY(0) scale(1); filter: brightness(1); }
      22% { transform: translateY(-12px) scale(1.28); filter: brightness(1.55) saturate(1.35); }
      55% { transform: translateY(4px) scale(1.06); filter: brightness(1.2); }
      100% { transform: translateY(0) scale(1); filter: brightness(1) saturate(1); }
    }

    .count-label {
      margin-top: 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .status-line {
      margin-top: 0.75rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--metal-light);
      min-height: 1em;
    }

    .status-line.err { color: var(--accent); }

    .button-stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .button-well {
      position: relative;
      width: min(72vw, 280px);
      height: min(72vw, 280px);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 35%, #1e2430 0%, var(--bezel) 70%);
      box-shadow:
        inset 0 12px 24px rgba(0, 0, 0, 0.85),
        inset 0 -2px 6px rgba(255, 255, 255, 0.04),
        0 4px 0 var(--rim);
    }

    .arcade-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 72%;
      height: 72%;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;

      background: radial-gradient(circle at 35% 30%, var(--accent-light) 0%, var(--accent) 45%, var(--accent-dark) 100%);
      box-shadow:
        0 10px 0 var(--accent-shadow),
        0 14px 0 rgba(0, 0, 0, 0.45),
        0 18px 32px rgba(0, 0, 0, 0.5),
        inset 0 4px 12px rgba(255, 255, 255, 0.35),
        inset 0 -8px 16px rgba(0, 0, 0, 0.25);

      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
    }

    .arcade-btn:hover:not(:disabled) {
      filter: brightness(1.05);
    }

    .arcade-btn:active:not(:disabled) {
      transform: translate(-50%, -50%) translateY(10px);
      box-shadow:
        0 2px 0 var(--accent-shadow),
        0 4px 0 rgba(0, 0, 0, 0.4),
        0 6px 16px rgba(0, 0, 0, 0.45),
        inset 0 2px 8px rgba(255, 255, 255, 0.25),
        inset 0 -4px 10px rgba(0, 0, 0, 0.35);
    }

    .arcade-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      filter: grayscale(0.3);
    }

    .arcade-btn.spring {
      animation: btnSpring 0.55s cubic-bezier(0.34, 1.45, 0.64, 1);
    }

    .arcade-btn.jackpot-hit {
      filter: brightness(1.4) saturate(1.35);
      box-shadow:
        0 10px 0 var(--accent-shadow),
        0 14px 0 rgba(0, 0, 0, 0.45),
        0 0 50px var(--accent-glow),
        inset 0 4px 12px rgba(255, 255, 255, 0.45),
        inset 0 -8px 16px rgba(0, 0, 0, 0.25);
      transition: filter 0.12s ease, box-shadow 0.12s ease;
    }

    .counter-panel.jackpot-flash {
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 0 56px var(--accent-glow);
      transition: box-shadow 0.15s ease;
    }

    @keyframes btnSpring {
      0% { transform: translate(-50%, -50%) translateY(10px) scale(0.96); }
      40% { transform: translate(-50%, -50%) translateY(-4px) scale(1.04); }
      70% { transform: translate(-50%, -50%) translateY(2px) scale(0.99); }
      100% { transform: translate(-50%, -50%) translateY(0) scale(1); }
    }

    #fx {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes rip {
      to { transform: scale(14); opacity: 0; }
    }

    @keyframes ripBig {
      to { transform: scale(22); opacity: 0; }
    }

    @keyframes ripBurst {
      to { transform: scale(10); opacity: 0; }
    }

    .recolor-btn {
      margin-top: 0.85rem;
      padding: 0.45rem 0.75rem;
      font-family: "Share Tech Mono", monospace;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--metal);
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .recolor-btn:hover:not(:disabled) {
      color: var(--accent-light);
      border-color: var(--metal-light);
      background: rgba(255, 255, 255, 0.07);
    }

    .recolor-btn:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }

    .footer-hint {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      opacity: 0.5;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="counterPanel" class="counter-panel loading">
      <div id="countValue" class="count-value" aria-live="polite">—</div>
      <div class="count-label">Click balance</div>
      <div id="statusLine" class="status-line">Connecting…</div>
      <button type="button" id="recolorBtn" class="recolor-btn" disabled>
        Randomize global color · 100
      </button>
    </div>

    <div class="button-stage">
      <canvas id="fx" width="400" height="400" aria-hidden="true"></canvas>
      <div class="button-well">
        <button type="button" id="pressBtn" class="arcade-btn" disabled aria-label="Press to increment global counter"></button>
      </div>
    </div>
  </div>
  <p class="footer-hint">GLOBAL COUNTER</p>

  <script>
    /* ═══════════════════════════════════════════════════════════════════
       PLACEHOLDER — paste your deployed Web App URL (ends in /exec)
       Deploy: New deployment → Web app → Execute as: Me → Who has access: Anyone
       ═══════════════════════════════════════════════════════════════════ */
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuTXtMVNyUxzQDdq7dGDn119fgkjVkqGXC5qAQu06MX7w3hbBEyiHOTHeqCRcRLNmocA/exec";

    const countEl = document.getElementById("countValue");
    const statusEl = document.getElementById("statusLine");
    const panelEl = document.getElementById("counterPanel");
    const btn = document.getElementById("pressBtn");
    const fxCanvas = document.getElementById("fx");
    const fxCtx = fxCanvas.getContext("2d");
    const recolorBtn = document.getElementById("recolorBtn");

    const RECOLOR_COST = 100;
    let recolorInFlight = false;
    let accentHueDeg = 12;

    // Invariant: displayedCount === confirmedCount + pendingIncrements
    // (confirmedCount = last authoritative server value from GET or successful POST)
    let confirmedCount = null;
    let displayedCount = null;
    let pendingIncrements = 0;
    let flushInFlight = false;
    let retryMs = 250;
    let retryTimer = null;
    const MAX_BATCH = 1000; // must stay in sync with Apps Script cap
    const JACKPOT_CHANCE = 1 / 20;
    const JACKPOT_DELTA = 20;
    const DEFAULT_THEME_HEX = "#ff3d2e";

    function normalizeServerState(data) {
      if (!data || typeof data !== "object") throw new Error("Server returned invalid data");
      const raw = data.count;
      const num =
        typeof raw === "number" && Number.isFinite(raw) ? raw : Number(raw);
      if (!Number.isFinite(num)) {
        throw new Error("Server response missing a numeric count");
      }
      let col = data.color;
      if (typeof col !== "string" || !/^#[0-9a-fA-F]{6}$/.test(col.trim())) {
        col = DEFAULT_THEME_HEX;
      } else {
        col = col.trim().toLowerCase();
      }
      return { count: Math.floor(num), color: col };
    }

    async function readJsonBody(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch (err) {
        const html = text.trimStart().startsWith("<");
        throw new Error(
          html
            ? "Server returned HTML instead of JSON — redeploy the Apps Script web app or check the URL."
            : "Server returned invalid JSON."
        );
      }
    }

    function hexToRgb(hex) {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      if (!m) return null;
      return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
    }

    function rgbToHex(rgb) {
      const c = (n) => Math.max(0, Math.min(255, n)).toString(16).padStart(2, "0");
      return `#${c(rgb.r)}${c(rgb.g)}${c(rgb.b)}`;
    }

    function mixRgb(a, b, t) {
      return {
        r: Math.round(a.r + (b.r - a.r) * t),
        g: Math.round(a.g + (b.g - a.g) * t),
        b: Math.round(a.b + (b.b - a.b) * t),
      };
    }

    function rgbToHue(rgb) {
      const r = rgb.r / 255;
      const g = rgb.g / 255;
      const b = rgb.b / 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const d = max - min;
      if (d < 1e-4) return 0;
      let h = 0;
      if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / d + 2) / 6;
      else h = ((r - g) / d + 4) / 6;
      return h * 360;
    }

    function applyTheme(hex) {
      const rgb = hexToRgb(hex);
      if (!rgb) return;
      accentHueDeg = rgbToHue(rgb);
      const root = document.documentElement;
      root.style.setProperty("--accent", hex);
      root.style.setProperty("--accent-dark", rgbToHex(mixRgb(rgb, { r: 0, g: 0, b: 0 }, 0.38)));
      root.style.setProperty("--accent-light", rgbToHex(mixRgb(rgb, { r: 255, g: 255, b: 255 }, 0.22)));
      root.style.setProperty("--accent-shadow", rgbToHex(mixRgb(rgb, { r: 0, g: 0, b: 0 }, 0.62)));
      root.style.setProperty("--accent-glow", `rgba(${rgb.r},${rgb.g},${rgb.b},0.45)`);
      root.style.setProperty("--accent-spot", `rgba(${rgb.r},${rgb.g},${rgb.b},0.07)`);
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.classList.toggle("err", isError);
    }

    function playClickSound(jackpot) {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        const ctx = new Ctx();
        if (jackpot) {
          const steps = [520, 780, 1040, 660];
          steps.forEach((freq, i) => {
            const t0 = ctx.currentTime + i * 0.055;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "square";
            osc.frequency.setValueAtTime(freq * (0.92 + Math.random() * 0.08), t0);
            gain.gain.setValueAtTime(0, t0);
            gain.gain.linearRampToValueAtTime(0.11, t0 + 0.012);
            gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t0);
            osc.stop(t0 + 0.22);
          });
          setTimeout(() => {
            try {
              ctx.close();
            } catch (_) { /* optional */ }
          }, 480);
        } else {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "square";
          const f0 = 280 + Math.random() * 420;
          const f1 = 70 + Math.random() * 160;
          const tDrop = 0.045 + Math.random() * 0.035;
          osc.frequency.setValueAtTime(f0, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(Math.max(40, f1), ctx.currentTime + tDrop);
          gain.gain.setValueAtTime(0.1 + Math.random() * 0.05, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.1);
          osc.onended = () => ctx.close();
        }
      } catch (_) { /* optional */ }
    }

    function clientPointFromClick(ev) {
      if (typeof ev.clientX === "number" && typeof ev.clientY === "number") {
        if (ev.clientX !== 0 || ev.clientY !== 0) return { x: ev.clientX, y: ev.clientY };
      }
      if (typeof ev.offsetX === "number" && typeof ev.offsetY === "number" && ev.target === btn) {
        const r = btn.getBoundingClientRect();
        return { x: r.left + ev.offsetX, y: r.top + ev.offsetY };
      }
      const r = btn.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }

    function burstParticles(clientX, clientY, jackpot) {
      const dpr = window.devicePixelRatio || 1;
      const w = fxCanvas.clientWidth * dpr;
      const h = fxCanvas.clientHeight * dpr;
      if (fxCanvas.width !== w || fxCanvas.height !== h) {
        fxCanvas.width = w;
        fxCanvas.height = h;
      }
      const scale = Math.min(dpr, 2);
      const cRect = fxCanvas.getBoundingClientRect();
      const nx = ((clientX - cRect.left) / Math.max(cRect.width, 1)) * w;
      const ny = ((clientY - cRect.top) / Math.max(cRect.height, 1)) * h;

      const br = btn.getBoundingClientRect();
      const bcx = ((br.left + br.width / 2 - cRect.left) / Math.max(cRect.width, 1)) * w;
      const bcy = ((br.top + br.height / 2 - cRect.top) / Math.max(cRect.height, 1)) * h;
      const outward = Math.atan2(ny - bcy, nx - bcx);

      const parts = [];
      const n = jackpot ? 52 : 28;
      const spMul = jackpot ? 1.45 : 1;
      const lifeDecay = jackpot ? 0.038 : 0.045;
      const maxMs = jackpot ? 780 : 600;
      for (let i = 0; i < n; i++) {
        const jitter = (Math.random() - 0.5) * (jackpot ? 20 : 14) * scale;
        const j2 = (Math.random() - 0.5) * (jackpot ? 20 : 14) * scale;
        const px = nx + Math.cos(outward + Math.PI / 2) * jitter + Math.cos(outward) * j2 * 0.35;
        const py = ny + Math.sin(outward + Math.PI / 2) * jitter + Math.sin(outward) * j2 * 0.35;
        const spread = (Math.random() - 0.5) * (jackpot ? 1.45 : 1.15);
        const a = outward + spread;
        const sp = (2.8 + Math.random() * (jackpot ? 9 : 6.5)) * scale * spMul;
        const hueJ = accentHueDeg + (Math.random() - 0.5) * (jackpot ? 55 : 42);
        const spark = jackpot && Math.random() < 0.35;
        parts.push({
          x: px,
          y: py,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          life: 1,
          r: (2 + Math.random() * (jackpot ? 4.5 : 3)) * scale,
          hue: spark ? 48 + Math.random() * 8 : hueJ + (Math.random() > 0.35 ? 0 : (Math.random() > 0.5 ? 18 : -22)),
          sat: spark ? 96 : 100,
          light: spark ? 72 : 62,
        });
      }

      let start = null;
      function frame(t) {
        if (!start) start = t;
        const elapsed = t - start;
        fxCtx.clearRect(0, 0, w, h);
        let alive = false;
        for (const p of parts) {
          if (p.life <= 0) continue;
          alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += (jackpot ? 0.12 : 0.15) * scale;
          p.life -= lifeDecay;
          fxCtx.beginPath();
          const hh = ((p.hue % 360) + 360) % 360;
          const sat = p.sat != null ? p.sat : 100;
          const light = p.light != null ? p.light : 62;
          fxCtx.fillStyle = `hsla(${hh}, ${sat}%, ${light}%, ${Math.max(0, p.life)})`;
          fxCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
          fxCtx.fill();
        }
        if (alive && elapsed < maxMs) requestAnimationFrame(frame);
        else fxCtx.clearRect(0, 0, w, h);
      }
      requestAnimationFrame(frame);
    }

    function rippleAtClick(clientX, clientY, jackpot) {
      const well = document.querySelector(".button-well");
      const wr = well.getBoundingClientRect();
      const cx = clientX - wr.left;
      const cy = clientY - wr.top;

      const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#ff3d2e";
      function addRipple(extra) {
        const ripple = document.createElement("div");
        ripple.style.cssText = extra;
        well.appendChild(ripple);
        const ms = jackpot ? 750 : 600;
        setTimeout(() => ripple.remove(), ms);
      }
      well.style.position = "relative";
      addRipple(`
        position:absolute;left:${cx}px;top:${cy}px;width:20px;height:20px;
        margin:-10px 0 0 -10px;border-radius:50%;
        border:3px solid ${accent};opacity:0.9;pointer-events:none;z-index:4;
        animation: ${jackpot ? "ripBig" : "rip"} ${jackpot ? "0.65s" : "0.55s"} ease-out forwards;
      `);
      if (jackpot) {
        setTimeout(() => {
          addRipple(`
            position:absolute;left:${cx}px;top:${cy}px;width:28px;height:28px;
            margin:-14px 0 0 -14px;border-radius:50%;
            border:2px solid rgba(255,248,220,0.95);opacity:0.75;pointer-events:none;z-index:3;
            animation: ripBurst 0.45s ease-out forwards;
          `);
        }, 70);
      }
    }

    function triggerSpring() {
      btn.classList.remove("spring");
      void btn.offsetWidth;
      btn.classList.add("spring");
      setTimeout(() => btn.classList.remove("spring"), 600);
    }

    function animateCount(jackpot) {
      countEl.classList.remove("tick", "tick-jackpot");
      void countEl.offsetWidth;
      countEl.classList.add(jackpot ? "tick-jackpot" : "tick");
    }

    function displayCount(n) {
      countEl.textContent = typeof n === "number" ? n.toLocaleString() : "—";
    }

    async function apiFetchState() {
      const u = new URL(APPS_SCRIPT_URL);
      u.searchParams.set("_ts", String(Date.now()));
      const res = await fetch(u.toString(), { method: "GET", cache: "no-store" });
      if (!res.ok) throw new Error("GET failed: " + res.status);
      const data = await readJsonBody(res);
      return normalizeServerState(data);
    }

    async function apiPostIncrement(inc) {
      const body = new URLSearchParams({ op: "increment", inc: String(inc) });
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString(),
        cache: "no-store",
      });
      if (!res.ok) throw new Error("POST failed: " + res.status);
      const data = await readJsonBody(res);
      const st = normalizeServerState(data);
      applyTheme(st.color);
      return st.count;
    }

    async function apiPostRecolor() {
      const body = new URLSearchParams({ op: "recolor" });
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString(),
        cache: "no-store",
      });
      if (!res.ok) throw new Error("POST failed: " + res.status);
      const data = await readJsonBody(res);
      if (data.ok === true) {
        return normalizeServerState(data);
      }
      if (data.ok === false && data.error === "need_100") {
        try {
          const st = normalizeServerState(data);
          confirmedCount = st.count;
          applyTheme(st.color);
          refreshDisplay();
        } catch (_) { /* ignore partial parse */ }
        throw new Error(`Need at least ${RECOLOR_COST} clicks on the server`);
      }
      throw new Error(data.error || "Recolor failed");
    }

    function setLiveStatus() {
      if (pendingIncrements > 0) {
        setStatus(`Syncing… (+${pendingIncrements} queued)`);
      } else {
        setStatus("Live · shared worldwide");
      }
      updateRecolorButton();
    }

    function updateRecolorButton() {
      if (!recolorBtn) return;
      const bal = confirmedCount === null ? 0 : confirmedCount + pendingIncrements;
      recolorBtn.textContent = `Randomize global color · ${RECOLOR_COST} (${bal} banked)`;
      const canTry = confirmedCount !== null && bal >= RECOLOR_COST && !recolorInFlight;
      recolorBtn.disabled = !canTry || btn.disabled;
    }

    function refreshDisplay() {
      if (confirmedCount === null) return;
      displayedCount = confirmedCount + pendingIncrements;
      displayCount(displayedCount);
      updateRecolorButton();
    }

    async function loadCount() {
      panelEl.classList.add("loading");
      panelEl.classList.remove("error");
      btn.disabled = true;
      setStatus("Loading count…");
      try {
        if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_YOUR")) {
          throw new Error("Set APPS_SCRIPT_URL in the script");
        }
        const st = await apiFetchState();
        confirmedCount = st.count;
        applyTheme(st.color);
        pendingIncrements = 0;
        refreshDisplay();
        panelEl.classList.remove("loading");
        setLiveStatus();
        btn.disabled = false;
        updateRecolorButton();
      } catch (e) {
        panelEl.classList.remove("loading");
        panelEl.classList.add("error");
        setStatus(e.message || "Could not load", true);
        btn.disabled = true;
        updateRecolorButton();
      }
    }

    function scheduleFlushSoon() {
      if (flushInFlight) return;
      if (retryTimer) return;
      retryTimer = setTimeout(() => {
        retryTimer = null;
        flushQueue();
      }, 120);
    }

    async function ensureFullyFlushed() {
      for (let attempt = 0; attempt < 120 && pendingIncrements > 0; attempt++) {
        while (flushInFlight) {
          await new Promise((r) => setTimeout(r, 30));
        }
        await flushQueue();
        await new Promise((r) => setTimeout(r, 40));
      }
    }

    async function flushQueue() {
      if (flushInFlight) return;
      if (pendingIncrements <= 0) return;
      flushInFlight = true;

      while (pendingIncrements > 0) {
        const batch = Math.min(pendingIncrements, MAX_BATCH);
        pendingIncrements -= batch;
        setLiveStatus();

        try {
          const n = await apiPostIncrement(batch);
          panelEl.classList.remove("error");
          confirmedCount = n;
          retryMs = 250;
          refreshDisplay();
          setLiveStatus();
        } catch (err) {
          pendingIncrements += batch;
          panelEl.classList.add("error");
          setStatus(`Offline · will retry (${Math.ceil(retryMs / 1000)}s) · queued +${pendingIncrements}`, true);

          flushInFlight = false;
          retryTimer = setTimeout(() => {
            retryTimer = null;
            flushQueue();
          }, retryMs);
          retryMs = Math.min(10000, Math.floor(retryMs * 1.8));
          return;
        }
      }

      flushInFlight = false;
    }

    async function onRecolorClick() {
      if (recolorInFlight || recolorBtn.disabled) return;
      recolorInFlight = true;
      btn.disabled = true;
      recolorBtn.disabled = true;
      setStatus("Syncing clicks, then spending…");
      try {
        await ensureFullyFlushed();
        if (pendingIncrements > 0) throw new Error("Still syncing — try again");
        const st = await apiPostRecolor();
        confirmedCount = st.count;
        applyTheme(st.color);
        animateCount();
        refreshDisplay();
        panelEl.classList.remove("error");
        setLiveStatus();
      } catch (e) {
        panelEl.classList.add("error");
        setStatus(e.message || "Could not change color", true);
      } finally {
        recolorInFlight = false;
        if (confirmedCount !== null) btn.disabled = false;
        updateRecolorButton();
      }
    }

    function onPress(ev) {
      if (btn.disabled) return;
      if (confirmedCount === null || typeof confirmedCount !== "number") return;

      const jackpot = Math.random() < JACKPOT_CHANCE;
      const delta = jackpot ? JACKPOT_DELTA : 1;

      const { x, y } = clientPointFromClick(ev);
      burstParticles(x, y, jackpot);
      rippleAtClick(x, y, jackpot);
      playClickSound(jackpot);

      pendingIncrements += delta;
      animateCount(jackpot);
      refreshDisplay();
      setLiveStatus();

      if (jackpot) {
        btn.classList.add("jackpot-hit");
        panelEl.classList.add("jackpot-flash");
        setTimeout(() => {
          btn.classList.remove("jackpot-hit");
          panelEl.classList.remove("jackpot-flash");
        }, 700);
      }

      scheduleFlushSoon();
    }

    btn.addEventListener("click", onPress);
    btn.addEventListener("mouseup", triggerSpring);
    btn.addEventListener("touchend", (ev) => {
      if (ev.target === btn) triggerSpring();
    });

    recolorBtn.addEventListener("click", onRecolorClick);

    window.addEventListener("online", () => {
      if (pendingIncrements > 0) flushQueue();
    });

    // Pull server truth when tab wakes up (other tabs / other visitors).
    document.addEventListener("visibilitychange", () => {
      if (document.hidden || confirmedCount === null) return;
      apiFetchState()
        .then((st) => {
          confirmedCount = st.count;
          applyTheme(st.color);
          refreshDisplay();
          setLiveStatus();
        })
        .catch(() => {});
    });

    loadCount();
  </script>
</body>
</html>
